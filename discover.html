<!DOCTYPE html>
<html>
    <head>
        <title>Exopossibilities-Discover</title>
        <link rel = "stylesheet" type = "text/css" href = "discover.css"/>
    </head>
    <body>
        <span id = "Home" onclick = "window.location.href = 'index.html'">Home</span><br>
        <input type="Search" id="search-input" placeholder="Search by planet name..."><br>
         <div class="filter-group">
          <label>Max Distance: <span id="dist-val">5000</span> parsecs</label>
          <input type="range" id="dist-filter" min="0" max="5000" value="5000"
              oninput="document.getElementById('dist-val').textContent = this.value; applyFilters()">
         </div>
         <div class="filter-group">
         <label>Temperature</label>
         <select id="temp-filter" onchange="applyFilters()">
              <option value="any">Any</option>
              <option value="cold">Too Cold (below 200K)</option>
              <option value="habitable">Possibly habitable (200–320K)</option>
              <option value="hot">Too Hot (above 320K)</option>
            </select>
        </div>
        </div>
        <div id = "planet_list"></div>
        <script src = "s.js"></script>
    </body>
</html>
